# Owlat Self-Hosted Stack
#
# Quick start (recommended): run the wizard, which generates secrets, brings up
# this stack, deploys the Convex functions, sets the runtime env vars, and
# bootstraps your admin account:
#   owlat quickstart            # or: bash scripts/setup.sh (legacy)
#
# `docker compose up -d` on its own boots the containers but is NOT a working
# install — the backend has no functions, no runtime env vars, and no way to
# log in. See docs/developer/self-hosting for the full by-hand sequence.
#
# Optional profiles:
#   --profile deploy   one-shot Convex function deployment (run after first boot)
#   --profile tls      Caddy reverse proxy with automatic HTTPS (production)
#
# Image tags:
#   Pinned: ghcr.io/wolvesdotink/<svc>:<semver>  (in generated docker-compose-<version>.yml)
#   Build:  Each service also declares `build:` for local source builds.
#
# Pinning policy (S1 / Phase 1):
#   • Owlat images use ${OWLAT_VERSION:-dev} — `dev` is a clear "local
#     build" sentinel, never a production artifact (no `dev` tag is ever
#     pushed to GHCR). Tenants always pull :<semver> via the pinned
#     compose file generated by scripts/gen-release-compose.sh.
#   • Upstream images (convex-backend, convex-dashboard, redis, clamav,
#     caddy) use dedicated *_VERSION env vars with hard-coded defaults.
#     Production releases further lock these to @sha256 digests via
#     gen-release-compose.sh. The Convex images default to `latest`
#     (matching Convex's own self-hosted compose): upstream only
#     publishes `latest` + per-commit SHA tags, and pinned SHAs have
#     been purged from GHCR before — a baked-in pin rots into a 404.

services:
  # ── Convex Backend (database + serverless functions) ──────────────────
  convex:
    image: ghcr.io/get-convex/convex-backend:${CONVEX_BACKEND_VERSION:-latest}
    # Bound to localhost by default: the SPA reaches Convex through the same
    # host (local quickstart) or through the Caddy tls profile (production).
    # Exposing 3210/3211 raw on a public interface is NOT recommended; if you
    # must, set CONVEX_BIND=0.0.0.0 and firewall it yourself.
    ports:
      - "${CONVEX_BIND:-127.0.0.1}:${CONVEX_PORT:-3210}:3210"
      - "${CONVEX_BIND:-127.0.0.1}:${CONVEX_SITE_PORT:-3211}:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      PORT: 3210
      SITE_PROXY_PORT: 3211
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      CONVEX_CLOUD_ORIGIN: ${NUXT_PUBLIC_CONVEX_URL:-http://localhost:3210}
      CONVEX_SITE_ORIGIN: ${NUXT_PUBLIC_CONVEX_SITE_URL:-http://localhost:3211}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 45s
    restart: unless-stopped

  # ── Convex Dashboard (admin/debugging UI) ─────────────────────────────
  # The dashboard has NO authentication of its own — anyone who can reach the
  # port gets full database read/write. Localhost-only and profile-gated:
  #   docker compose --profile dashboard up -d convex-dashboard
  # then reach it through an SSH tunnel (ssh -L 6791:127.0.0.1:6791 host).
  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:${CONVEX_DASHBOARD_VERSION:-latest}
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-6791}:6791"
    environment:
      CONVEX_URL: http://convex:3210
    depends_on:
      convex:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    profiles:
      - dashboard
    restart: unless-stopped

  # ── Web UI (Nuxt SPA) ────────────────────────────────────────────────
  web:
    image: ghcr.io/wolvesdotink/web:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        RUNTIME_BASE: node:26-alpine
        OWLAT_VERSION: ${OWLAT_VERSION:-dev}
        OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
        OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_CONVEX_URL: ${NUXT_PUBLIC_CONVEX_URL:-http://localhost:3210}
      NUXT_PUBLIC_CONVEX_SITE_URL: ${NUXT_PUBLIC_CONVEX_SITE_URL:-http://localhost:3211}
      NUXT_CONVEX_SITE_URL_INTERNAL: http://convex:3211
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Deployment mode — shown in onboarding banner, hides hosted-only UI
      OWLAT_DEPLOYMENT_MODE: ${OWLAT_DEPLOYMENT_MODE:-selfhost}
      # Version metadata (for in-app update UI)
      OWLAT_VERSION: ${OWLAT_VERSION:-dev}
      OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
      OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
      # Shared secret for calling the updater sidecar
      INSTANCE_SECRET: ${INSTANCE_SECRET}
    depends_on:
      convex:
        condition: service_healthy
    # Hardening — matches the production VPS template. The web tier serves only
    # the SPA + a thin BFF; it needs no Linux capabilities beyond binding its
    # port and writes nothing to disk outside /tmp.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    # Must exceed the web app's graceful-shutdown HARD_EXIT_MS (40s) so the
    # hard-exit watchdog can fire before Docker SIGKILLs. Matches the VPS template.
    stop_grace_period: 45s

  # ── MTA (Mail Transfer Agent) ─────────────────────────────────────────
  mta:
    image: ghcr.io/wolvesdotink/mta:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: apps/mta/Dockerfile
      args:
        OWLAT_VERSION: ${OWLAT_VERSION:-dev}
        OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
        OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
    ports:
      # Internal HTTP API (MTA_API_KEY-protected) — Convex reaches it via the
      # docker network; never expose it publicly.
      - "127.0.0.1:${MTA_HTTP_PORT:-3100}:3100"
      - "${MTA_SMTP_PORT:-25}:25"
    environment:
      PORT: 3100
      BOUNCE_PORT: 25
      REDIS_URL: redis://:${REDIS_PASSWORD:-owlat-internal}@redis:6379
      MTA_API_KEY: ${MTA_API_KEY}
      EHLO_HOSTNAME: ${EHLO_HOSTNAME:-mail.localhost}
      RETURN_PATH_DOMAIN: ${RETURN_PATH_DOMAIN:-bounces.localhost}
      BOUNCE_VERP_KEY: ${BOUNCE_VERP_KEY:-}
      CONVEX_SITE_URL: http://convex:3211
      MTA_WEBHOOK_SECRET: ${MTA_WEBHOOK_SECRET}
      IP_POOLS_TRANSACTIONAL: ${IP_POOLS_TRANSACTIONAL:-127.0.0.1}
      IP_POOLS_CAMPAIGN: ${IP_POOLS_CAMPAIGN:-127.0.0.1}
      DKIM_KEYS: ${DKIM_KEYS:-{}}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-50}
      LOG_LEVEL: ${MTA_LOG_LEVEL:-info}
      NODE_ENV: production
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      OWLAT_VERSION: ${OWLAT_VERSION:-dev}
      OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
      OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        # required:false — ClamAV is profile-gated (scan.files flag); the MTA
        # must start without it. service_started, NOT service_healthy:
        # attachment scanning is fail-open by design — the MTA must come up (and
        # deliver mail) while ClamAV is still downloading/loading its signature
        # DB, which can take many minutes on first boot. Matches the VPS template.
        required: false
        condition: service_started
      convex:
        condition: service_healthy
    # Hardening — matches the production VPS template. NET_BIND_SERVICE is the one
    # capability the MTA needs (it binds privileged port 25 for inbound bounces).
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 45s
    # The MTA is opt-in. The `mta` profile activates when the MTA is the delivery
    # provider (EMAIL_PROVIDER=mta) or when postbox/inbox need it for inbound /
    # hosted send — surfaced via COMPOSE_PROFILES (getActiveProfiles). A
    # Resend/SES, receive-only, or IMAP-only deployment does not run it. The
    # default self-host (.env.selfhost.example) ships COMPOSE_PROFILES=mta.
    profiles:
      - mta
    restart: unless-stopped

  # ── Redis (MTA job queue) ─────────────────────────────────────────────
  # Pinned minor version. Major upgrades (7.x → 8.x) require a conscious
  # template bump. Production releases further pin @sha256.
  # No published port: only the MTA reaches Redis, over the internal docker
  # network. The password is defense-in-depth for that internal hop (and a
  # hard requirement if you ever do publish the port).
  redis:
    image: redis:${REDIS_VERSION:-7.4-alpine}
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-owlat-internal}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-owlat-internal}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ── ClamAV (antivirus scanning) ──────────────────────────────────────
  # Pinned minor version. Production releases further pin @sha256.
  clamav:
    # `stable` tracks the current supported release — ClamAV deletes old minor
    # tags from Docker Hub (1.3 is gone), so a numeric default rots into a 404.
    image: clamav/clamav:${CLAMAV_VERSION:-stable}
    # No published port: only the MTA talks to clamd, over the internal
    # docker network.
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 5
      # First boot downloads the full signature DB (~300 MB) and loads it into
      # RAM before clamd answers — easily several minutes on a small VPS.
      start_period: 600s
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Profile-gated on the `clamav` docker profile — the scan.files feature flag
    # (packages/shared/src/featureFlags.ts → dockerProfiles: ['clamav']). When
    # file scanning is off, clamd does not run at all, saving the ~300 MB+ RAM it
    # holds its signature DB in. The MTA depends on it with required:false +
    # service_started, so the MTA still boots (attachment scanning fail-open).
    profiles:
      - clamav
    restart: unless-stopped

  # ── Docker Socket Proxy (least-privilege Docker API for the updater) ──
  # The updater needs the Docker API to pull images and roll containers, but
  # mounting the raw read-write /var/run/docker.sock into it would hand the
  # updater (and anything that compromises its HTTP surface) effective root on
  # the host. Instead it talks to this proxy, which mounts the socket READ-ONLY
  # and exposes only the handful of endpoints `docker compose pull/up/ps` needs.
  # Backported from the production VPS template (infra/templates).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:${DOCKER_SOCKET_PROXY_VERSION:-0.3}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Least-privilege: only the ops the updater invokes. `docker compose
      # pull`/`up -d` uses CONTAINERS + IMAGES; `docker compose ps --format json`
      # uses CONTAINERS. SERVICES/TASKS are Swarm-only resources, unused here.
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      POST: 1
      # Block everything dangerous.
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    security_opt:
      - no-new-privileges:true
    # Isolated on an internal-only network so ONLY the updater can reach the
    # Docker API. No internet-facing tier (web/BFF, caddy, mta, imap, mail-sync)
    # shares this network, closing the SSRF/RCE → Docker-API → host-root path.
    # docker-socket-proxy does pure network-level allowlisting (no auth), so
    # network reachability IS the access boundary.
    networks:
      - docker-proxy
    restart: unless-stopped

  # ── Updater sidecar (in-app updates) ──────────────────────────────────
  # Runs `docker compose pull && up -d` on behalf of the web app.
  # Exposed on localhost only (no public port) — reached by web via Docker network.
  # Drives Docker through the least-privilege docker-socket-proxy (DOCKER_HOST)
  # rather than mounting the raw RW socket; mounts only the install dir so it can
  # write a new compose template before rolling containers.
  updater:
    image: ghcr.io/wolvesdotink/updater:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: apps/updater/Dockerfile
      args:
        OWLAT_VERSION: ${OWLAT_VERSION:-dev}
        OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
        OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
    environment:
      PORT: 3200
      INSTANCE_SECRET: ${INSTANCE_SECRET}
      OWLAT_DIR: /owlat
      # Reach the Docker API through the least-privilege proxy, never the raw
      # socket. The docker CLI inside the updater honours DOCKER_HOST.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      OWLAT_VERSION: ${OWLAT_VERSION:-dev}
      OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
      OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
    volumes:
      # Install directory — updater writes the new compose template here. The
      # raw docker.sock mount is gone; Docker is reached via docker-socket-proxy.
      - ${OWLAT_INSTALL_DIR:-./}:/owlat
    depends_on:
      - docker-socket-proxy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Bridges both networks: `default` keeps web → updater:3200 reachable, while
    # `docker-proxy` (internal-only) is the SOLE path to the Docker socket proxy.
    networks:
      - default
      - docker-proxy
    # No ports: reached only via the internal network as http://updater:3200
    restart: unless-stopped

  # ── Caddy reverse proxy (optional, --profile tls) ─────────────────────
  # Automatic HTTPS for production. Fronts web (3000), convex (3210/3211),
  # and mta (3100) on subdomains; terminates TLS via Let's Encrypt.
  # Edit Caddyfile to match your domains before bringing this up.
  caddy:
    image: caddy:${CADDY_VERSION:-2.8-alpine}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_started
      convex:
        condition: service_started
      # The MTA is opt-in (profile-gated): Caddy must start without it on a
      # Resend/SES / receive-only deployment. Caddy proxies the MTA admin port
      # only when present, so a missing upstream is harmless.
      mta:
        condition: service_started
        required: false
    # Hardening — NET_BIND_SERVICE so Caddy can bind privileged 80/443; it writes
    # only to the caddy-data / caddy-config volumes (not read_only-able).
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    profiles:
      - tls
    restart: unless-stopped

  # ── Convex Deploy (one-shot — pushes tenant functions to backend) ─────
  # Required at least once after first boot to push apps/api functions.
  # Re-run after pulling new images: `docker compose --profile deploy run --rm convex-deploy`
  convex-deploy:
    image: ghcr.io/wolvesdotink/convex-deploy:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: docker/convex-deploy.Dockerfile
      args:
        OWLAT_VERSION: ${OWLAT_VERSION:-dev}
        OWLAT_GIT_SHA: ${OWLAT_GIT_SHA:-unknown}
        OWLAT_BUILD_DATE: ${OWLAT_BUILD_DATE:-unknown}
    environment:
      CONVEX_SELF_HOSTED_URL: http://convex:3210
      CONVEX_SELF_HOSTED_ADMIN_KEY: ${CONVEX_ADMIN_KEY}
    depends_on:
      convex:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - deploy

  # ── Code Worker (AI coding agent sidecar) ──────────────────────────
  code-worker:
    # Never published to a registry — the explicit name just makes the locally
    # built tag deterministic (compose's default name depends on the project
    # directory), so dev-mode image pushes can address it.
    image: owlat-code-worker:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: apps/code-worker/Dockerfile
    volumes:
      - code-workspace:/workspace
    environment:
      CONVEX_URL: http://convex:3210
      # The worker polls an internalQuery + drives internalMutations, so it
      # authenticates with the deployment admin key (like imap / mail-sync).
      CONVEX_ADMIN_KEY: ${CONVEX_ADMIN_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      GIT_REPO_URL: ${GIT_REPO_URL:-}
      GIT_BASE_BRANCH: ${GIT_BASE_BRANCH:-main}
      POLL_INTERVAL_MS: ${CODE_WORKER_POLL_MS:-10000}
    security_opt:
      - no-new-privileges:true
    depends_on:
      convex:
        condition: service_healthy
    profiles:
      - inbox-codetasks
      - dev
    restart: unless-stopped

  # ── Ollama (optional local LLM — agent pipeline / knowledge / semantic search) ──
  # Run inference on your own hardware instead of a hosted provider. Set the
  # Convex function env vars LLM_PROVIDER=ollama and LLM_BASE_URL=http://ollama:11434/v1.
  # No published port: reachable only via the internal Docker network as
  # ollama:11434 — the host must never expose 11434. Gated under --profile dev
  # alongside the other optional AI sidecar.
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - ai
      - dev
    restart: unless-stopped

  # ── IMAP TLS bootstrap (self-signed default cert for the IMAPS listener) ──
  # The IMAP server (port 993) refuses to start in production without a TLS
  # cert/key (apps/imap/src/server.ts); on a fresh install nothing populates the
  # shared mail-certs volume, so the imap container crash-loops. This one-shot
  # init self-signs a default cert into the volume when one is absent, so the
  # personal-mail profile boots out of the box. Idempotent: an operator- or
  # ACME-provisioned default.crt/default.key is left untouched, so dropping in a
  # CA-issued pair just works. For a public mailbox host, replace the self-signed
  # pair with a real certificate (or front IMAPS with a TLS-terminating proxy).
  imap-cert-init:
    image: alpine:${ALPINE_VERSION:-3.20}
    command:
      - /bin/sh
      - -ec
      - |
        cert_dir=/opt/owlat/certs
        if [ -s "$$cert_dir/default.crt" ] && [ -s "$$cert_dir/default.key" ]; then
          echo "imap-cert-init: TLS cert already present in $$cert_dir — leaving it untouched"
          exit 0
        fi
        echo "imap-cert-init: generating self-signed IMAP TLS cert in $$cert_dir"
        apk add --no-cache openssl >/dev/null
        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
          -keyout "$$cert_dir/default.key" \
          -out "$$cert_dir/default.crt" \
          -subj "/CN=$${IMAP_GREETING_HOST}" \
          -addext "subjectAltName=DNS:$${IMAP_GREETING_HOST}"
        chmod 600 "$$cert_dir/default.key"
        echo "imap-cert-init: done"
    environment:
      IMAP_GREETING_HOST: ${EHLO_HOSTNAME:-mail.localhost}
    volumes:
      - mail-certs:/opt/owlat/certs
    # no-new-privileges only: this one-shot runs `apk add` (needs CAP_CHOWN to
    # extract packages), so a blanket cap_drop would break the cert bootstrap.
    security_opt:
      - no-new-privileges:true
    profiles:
      - personal-mail
    restart: "no"

  # ── IMAP server (Postbox personal mailboxes — port 993) ──────────────
  # Activated by feature-flag profile "personal-mail" (postbox flag).
  imap:
    image: ghcr.io/wolvesdotink/imap:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: apps/imap/Dockerfile
    ports:
      - "${IMAP_PORT:-993}:993"
    environment:
      IMAP_PORT: "993"
      IMAP_GREETING_HOST: ${EHLO_HOSTNAME:-mail.localhost}
      CONVEX_URL: http://convex:3210
      CONVEX_ADMIN_KEY: ${CONVEX_ADMIN_KEY:-}
      TLS_CERT_DIR: /opt/owlat/certs
      LOG_LEVEL: ${IMAP_LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - mail-certs:/opt/owlat/certs:ro
    depends_on:
      convex:
        condition: service_healthy
      # Block until the self-signed default cert is in the shared volume,
      # otherwise the IMAPS listener refuses to start (production TLS guard).
      imap-cert-init:
        condition: service_completed_successfully
    # Hardening — NET_BIND_SERVICE so the IMAPS listener can bind privileged 993.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    profiles:
      - personal-mail
    stop_grace_period: 30s
    restart: unless-stopped

  # ── Mail Sync worker (external IMAP/SMTP accounts) ────────────────────
  # Activated by feature-flag profile "external-mail" (mail.external flag).
  # Connects OUT to users' own mailboxes; exposes only an internal /send +
  # /test API to Convex — no public ports.
  mail-sync:
    image: ghcr.io/wolvesdotink/mail-sync:${OWLAT_VERSION:-dev}
    build:
      context: .
      dockerfile: apps/mail-sync/Dockerfile
    environment:
      MAIL_SYNC_PORT: "3200"
      CONVEX_URL: http://convex:3210
      CONVEX_ADMIN_KEY: ${CONVEX_ADMIN_KEY:-}
      # Storage URLs are minted on the PUBLIC convex origin; allow fetching there.
      MAIL_SYNC_FETCH_ORIGINS: ${NUXT_PUBLIC_CONVEX_URL:-http://localhost:3210}
      # Required — generated by setup (ensureSecrets, alongside MTA_API_KEY) and
      # pushed into the Convex runtime. No empty default: apps/mail-sync/src/config.ts
      # throws on an empty MAIL_SYNC_API_KEY, so a blank fallback would just turn a
      # clear "missing key" into a crash-loop. Matches the MTA_API_KEY contract.
      MAIL_SYNC_API_KEY: ${MAIL_SYNC_API_KEY}
      LOG_LEVEL: ${MAIL_SYNC_LOG_LEVEL:-info}
      NODE_ENV: production
    depends_on:
      convex:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    profiles:
      - external-mail
    stop_grace_period: 30s
    restart: unless-stopped

# ── Networks ────────────────────────────────────────────────────────────────
# `default` is the implicit bridge every service joins unless it opts out — the
# whole stack talks over it. `docker-proxy` is an internal-only network (no
# external/host routing) carrying the privileged Docker API: only the
# docker-socket-proxy and the updater attach to it, so no internet-facing tier
# can reach the Docker socket proxy even if compromised.
networks:
  default:
  docker-proxy:
    internal: true

volumes:
  convex-data:
  mail-certs:
  redis-data:
  clamav-data:
  code-workspace:
  caddy-data:
  caddy-config:
  ollama-data:
