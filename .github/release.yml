changelog:
  exclude:
    labels:
      - dependencies
    authors:
      - dependabot
      - dependabot[bot]

  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: API & Backend
      labels:
        - api
        - backend
        - convex
    - title: Email Builder
      labels:
        - email-builder
        - email-renderer
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Infrastructure
      labels:
        - infrastructure
        - ci
        - devops
    - title: Other Changes
      labels:
        - "*"
