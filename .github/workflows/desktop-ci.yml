name: Desktop CI

# Gates the Tauri desktop app on PRs that touch it: the Rust shell (incl. the
# SSH provisioning transport) compiles + unit tests pass, and the TS bridge
# typechecks. Path-filtered so it only runs when desktop code changes — the full
# signed multi-platform build lives in desktop-release.yml (tag-triggered).

on:
  pull_request:
    branches: [main, stage, pro]
    paths:
      - 'apps/desktop/**'
      - '.github/workflows/desktop-ci.yml'
      # Root dependency/catalog changes alter what the desktop build resolves.
      - 'bun.lock'
      - 'package.json'

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust build + tests
    runs-on: ubuntu-22.04
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v5

      # Linux system deps required by Tauri's webview + tray. perl/make (needed
      # by the vendored OpenSSL/libssh2 build for `ssh2`) are preinstalled.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # `tauri::generate_context!()` embeds the frontend dist at compile time, so
      # the path must exist. A placeholder is enough for a Rust-only gate (the
      # real SPA bundle is built by tauri-action in the release workflow).
      - name: Stub frontend dist
        run: |
          mkdir -p apps/web/.output/public
          echo '<!doctype html><title>ci</title>' > apps/web/.output/public/index.html

      - name: Lint desktop TS bridge
        run: bun run --cwd apps/desktop lint

      - name: Typecheck desktop TS bridge
        run: bun run --cwd apps/desktop typecheck

      - name: Test desktop TS bridge
        run: bun run --cwd apps/desktop test

      - name: Rust formatting
        run: cargo fmt --check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build + test Rust shell
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
