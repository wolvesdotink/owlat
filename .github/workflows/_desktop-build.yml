name: _desktop-build

# Reusable CORE that builds the Tauri desktop app for macOS / Windows / Linux and
# uploads the signed artifacts + updater manifest (latest.json) to an
# ALREADY-EXISTING GitHub Release (by numeric release_id). It never creates or
# publishes the release — the caller owns that, so the same core serves both the
# unified `v*` release (release.yml) and the desktop-only `desktop-v*` release
# (desktop-release.yml).
#
# Signing & notarization are SECRET-GATED: when the relevant repo secrets are
# absent (forks, PRs), the build still runs and produces unsigned artifacts.

on:
  workflow_call:
    inputs:
      tag:
        description: 'The git tag the Release is attached to (e.g. v0.2.0)'
        required: true
        type: string
      release_id:
        description: 'Numeric id of the existing GitHub Release to upload to'
        required: true
        type: string

permissions:
  contents: write # upload artifacts to the Release
  id-token: write # OIDC for build provenance attestations
  attestations: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS binary (Apple Silicon + Intel).
          - platform: macos-14
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      # Linux system deps required by Tauri's webview + tray.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      # The ssh2 crate builds vendored OpenSSL/libssh2, which needs NASM on
      # Windows (Strawberry Perl is preinstalled on windows-latest). Mirrors the
      # desktop-ci gate so the release build compiles the same way it is tested.
      - name: Install NASM (Windows vendored OpenSSL build)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # Make the release TAG the single source of truth for the shipped version.
      # `bun run release:cut` keeps Cargo.toml in step, but tauri-action derives
      # the installer + latest.json version from Cargo.toml, so a tag cut any
      # other way (e.g. a quick `desktop-v*` fix tag) would ship artifacts
      # advertising a stale version and existing installs would see NO update.
      # Strip the `desktop-v` / `v` prefix and stamp the package version in
      # place. Idempotent (re-running on the same tag is a no-op) and only ever
      # runs inside the tag-triggered release callers of this core.
      - name: Stamp release version from tag
        shell: bash
        working-directory: apps/desktop/src-tauri
        env:
          # Passed via env (never interpolated into the script body) so a crafted
          # tag cannot break out of quotes and inject shell into this signing job.
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#desktop-v}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not resolve to a semver version (got '$VERSION')." >&2
            exit 1
          fi
          # Replace only the [package] version (the sole `^version = ` line);
          # dependency versions are `name = { version = ... }` and untouched.
          awk -v v="$VERSION" '
            /^version = / && !done { print "version = \"" v "\""; done=1; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          echo "Stamped desktop version -> $VERSION"
          grep -n '^version = ' Cargo.toml

      # Signing env is exported only when the secret actually has a value.
      # GitHub renders unset secrets as EMPTY strings, and tauri-bundler treats
      # a set-but-empty APPLE_CERTIFICATE as "sign with this" — `security
      # import` then fails the whole build instead of skipping signing.
      - name: Export signing env (skip unset secrets)
        shell: bash
        env:
          # Updater signing (required for auto-update to verify downloads).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (skipped when unset → unsigned .app/.dmg).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode (skipped when unset).
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
            APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
            APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID \
            WINDOWS_CERTIFICATE WINDOWS_CERTIFICATE_PASSWORD; do
            value="${!name}"
            if [ -n "$value" ]; then
              {
                echo "${name}<<__SIGNING_ENV_EOF__"
                echo "$value"
                echo "__SIGNING_ENV_EOF__"
              } >> "$GITHUB_ENV"
              echo "exported ${name}"
            else
              echo "skipped ${name} (not configured)"
            fi
          done
          # The updater key's password may legitimately be EMPTY, and GitHub
          # cannot store an empty secret. tauri only skips the interactive
          # password prompt when the password env is SET — so when the key is
          # configured, always export the password, even as "".
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ] && [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> "$GITHUB_ENV"
            echo "exported TAURI_SIGNING_PRIVATE_KEY_PASSWORD (empty — passwordless key)"
          fi

      # Unsigned release artifacts trip Gatekeeper ("Apple could not verify…",
      # with Move to Trash as the default) / SmartScreen for every downloader.
      # The build is allowed to proceed (forks and PRs have no secrets), but a
      # release cut without signing must be a loud, visible choice — not a
      # silent one discovered by end users.
      - name: Warn when release artifacts will be unsigned
        shell: bash
        run: |
          set -euo pipefail
          warn() {
            echo "::warning::$1"
            printf '> [!WARNING]\n> %s\n\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }
          if [ "$RUNNER_OS" = "macOS" ]; then
            if [ -z "${APPLE_CERTIFICATE:-}" ]; then
              warn "macOS artifacts will be UNSIGNED (APPLE_CERTIFICATE secret not configured). Gatekeeper will block the app with 'Apple could not verify…' for every user. See apps/desktop/README.md → Release (CI)."
            elif [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
              # tauri only notarizes when ALL THREE are present — a partial set
              # (e.g. APPLE_ID configured, APPLE_PASSWORD still missing) skips
              # notarization just like none at all.
              warn "macOS artifacts will be signed but NOT notarized (need all of APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID; at least one is not configured). Gatekeeper still blocks non-notarized downloads. See apps/desktop/README.md → Release (CI)."
            fi
          fi
          if [ "$RUNNER_OS" = "Windows" ] && [ -z "${WINDOWS_CERTIFICATE:-}" ]; then
            warn "Windows artifacts will be UNSIGNED (WINDOWS_CERTIFICATE secret not configured). SmartScreen will warn on first run. See apps/desktop/README.md → Release (CI)."
          fi

      - name: Build, sign & upload desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          # Required for uploading the bundles to the draft Release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # Upload to the Release the caller already created; do NOT create a new
          # one. Across the 3 matrix jobs tauri-action merges each platform into
          # the same latest.json on this release.
          releaseId: ${{ inputs.release_id }}
          tagName: ${{ inputs.tag }}
          includeUpdaterJson: true
          # tauri.release.conf.json enables createUpdaterArtifacts only here:
          # unsigned dev/CI builds must not require the updater signing key.
          args: ${{ matrix.args }} --config src-tauri/tauri.release.conf.json

      # When signing IS configured, prove the shipped .app actually passes
      # Gatekeeper before the caller publishes the draft Release: a bad
      # certificate, broken entitlements, or a failed/unstapled notarization
      # must fail the workflow here (release stays draft), not surface as
      # "Apple could not verify Owlat.app" on a user's machine.
      - name: Verify macOS signature & notarization
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos \
            -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::Signing is configured but no .app bundle was found to verify." >&2
            exit 1
          fi
          echo "Verifying $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            # Stapled ticket + Gatekeeper assessment == what end users' Macs check.
            xcrun stapler validate "$APP_PATH"
            spctl --assess --type execute --verbose=2 "$APP_PATH"
          else
            # Match tauri's own gate: notarization ran only if all three were set.
            echo "Notarization secrets not (fully) configured — skipped stapler/Gatekeeper assessment."
          fi
