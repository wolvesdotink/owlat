name: _desktop-build

# Reusable CORE that builds the Tauri desktop app for macOS / Windows / Linux and
# uploads the signed artifacts + updater manifest (latest.json) to an
# ALREADY-EXISTING GitHub Release (by numeric release_id). It never creates or
# publishes the release — the caller owns that, so the same core serves both the
# unified `v*` release (release.yml) and the desktop-only `desktop-v*` release
# (desktop-release.yml).
#
# Signing & notarization are SECRET-GATED: when the relevant repo secrets are
# absent (forks, PRs), the build still runs and produces unsigned artifacts.

on:
  workflow_call:
    inputs:
      tag:
        description: 'The git tag the Release is attached to (e.g. v0.2.0)'
        required: true
        type: string
      release_id:
        description: 'Numeric id of the existing GitHub Release to upload to'
        required: true
        type: string

permissions:
  contents: write # upload artifacts to the Release
  id-token: write # OIDC for build provenance attestations
  attestations: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS binary (Apple Silicon + Intel).
          - platform: macos-14
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      # Linux system deps required by Tauri's webview + tray.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      # The ssh2 crate builds vendored OpenSSL/libssh2, which needs NASM on
      # Windows (Strawberry Perl is preinstalled on windows-latest). Mirrors the
      # desktop-ci gate so the release build compiles the same way it is tested.
      - name: Install NASM (Windows vendored OpenSSL build)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # Make the release TAG the single source of truth for the shipped version.
      # Cargo.toml stays frozen at 0.1.0 for local dev; tauri-action derives the
      # installer + latest.json version from it, so without this a `v0.2.0` tag
      # would ship artifacts advertising 0.1.0 and existing installs would see
      # NO update. Strip the `desktop-v` / `v` prefix and stamp the package
      # version in place. Idempotent (re-running on the same tag is a no-op) and
      # only ever runs inside the tag-triggered release callers of this core.
      - name: Stamp release version from tag
        shell: bash
        working-directory: apps/desktop/src-tauri
        env:
          # Passed via env (never interpolated into the script body) so a crafted
          # tag cannot break out of quotes and inject shell into this signing job.
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#desktop-v}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not resolve to a semver version (got '$VERSION')." >&2
            exit 1
          fi
          # Replace only the [package] version (the sole `^version = ` line);
          # dependency versions are `name = { version = ... }` and untouched.
          awk -v v="$VERSION" '
            /^version = / && !done { print "version = \"" v "\""; done=1; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          echo "Stamped desktop version -> $VERSION"
          grep -n '^version = ' Cargo.toml

      - name: Build, sign & upload desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          # Updater signing (required for auto-update to verify downloads).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (skipped when unset → unsigned .app/.dmg).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode (skipped when unset).
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          # Upload to the Release the caller already created; do NOT create a new
          # one. Across the 3 matrix jobs tauri-action merges each platform into
          # the same latest.json on this release.
          releaseId: ${{ inputs.release_id }}
          tagName: ${{ inputs.tag }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
