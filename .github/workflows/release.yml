name: Release (unified)

# UNIFIED release: one tag builds and publishes EVERYTHING onto a single GitHub
# Release — the server service images (GHCR) AND the desktop apps
# (macOS / Windows / Linux) + updater manifest.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# For a single-target fix release, use the dedicated pipelines instead:
#   git tag server-v0.2.1  && git push origin server-v0.2.1    # server images only
#   git tag desktop-v0.2.1 && git push origin desktop-v0.2.1    # desktop apps only
#
# Coordination: this workflow creates ONE draft Release, the reusable server and
# desktop cores upload their assets to it in parallel, then `publish` flips it
# live. The desktop app's own version comes from apps/desktop/src-tauri (Cargo /
# tauri.conf) — keep it in step with the tag before cutting a unified release.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the Release + upload assets
  packages: write # push images to GHCR
  id-token: write # OIDC for cosign keyless signing + attestations
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved unified release VERSION=${VERSION}"

  # Create ONE draft Release up front; both cores attach their assets to it.
  create-release:
    name: Create draft Release
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: create
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ needs.resolve.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: true # published by the `publish` job once both cores succeed
          prerelease: ${{ contains(needs.resolve.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## Owlat v${{ needs.resolve.outputs.version }}

            ### Self-hosted server

            From the admin dashboard → **Settings → System & Updates** → "Update now", or:

            ```sh
            owlat upgrade --version ${{ needs.resolve.outputs.version }}
            ```

            Manual upgrade (fetch compose + SHA256, verify, apply):

            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/docker-compose-${{ needs.resolve.outputs.version }}.yml -o docker-compose.yml
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/docker-compose-${{ needs.resolve.outputs.version }}.yml.sha256 -o docker-compose.yml.sha256
            sha256sum -c <(sed "s|docker-compose-${{ needs.resolve.outputs.version }}.yml|docker-compose.yml|" docker-compose.yml.sha256)
            docker compose pull && docker compose up -d
            docker compose --profile deploy run --rm convex-deploy
            ```

            ### Desktop app

            Download the installer for your OS from the assets below (macOS `.dmg`,
            Windows `.msi`/`.exe`, Linux `.AppImage`/`.deb`). Existing installs
            auto-update to this version.

            ### Supply-chain verification (recommended)

            ```sh
            cosign verify ghcr.io/${{ github.repository_owner }}/web:${{ needs.resolve.outputs.version }} \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*@.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
            gh attestation verify docker-compose.yml --repo ${{ github.repository }}
            ```

            **Images:** `web`, `mta`, `updater`, `convex-deploy`, `imap`, `mail-sync`, `code-worker`, `setup` — all `ghcr.io/${{ github.repository_owner }}/<name>:${{ needs.resolve.outputs.version }}`

  server:
    name: Server images
    needs: [resolve, create-release]
    uses: ./.github/workflows/_server-build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      tag: ${{ github.ref_name }}
    secrets: inherit

  desktop:
    name: Desktop apps
    needs: [resolve, create-release]
    uses: ./.github/workflows/_desktop-build.yml
    with:
      tag: ${{ github.ref_name }}
      release_id: ${{ needs.create-release.outputs.release_id }}
    secrets: inherit

  publish:
    name: Publish Release
    needs: [resolve, server, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Publish (flip draft → live)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "$VERSION" == *-* ]]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --prerelease
          else
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest
          fi
          echo "Published $TAG (server images + desktop apps)."
