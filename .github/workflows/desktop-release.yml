name: Desktop Release

# Builds the Tauri desktop app for macOS / Windows / Linux and publishes signed
# artifacts + an updater manifest to a GitHub Release.
#
# Trigger: push a tag like `desktop-v0.1.0` (kept separate from the Docker
# `v*.*.*` release pipeline so the two version independently).
#   git tag desktop-v0.1.0 && git push origin desktop-v0.1.0
#
# Signing & notarization are SECRET-GATED: when the relevant repo secrets are
# absent (forks, PRs), the build still runs and produces unsigned artifacts, so
# external contributors are never blocked. Only tag pushes publish.

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write # create the GitHub Release + upload artifacts
  id-token: write # OIDC for build provenance attestations
  attestations: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS binary (Apple Silicon + Intel).
          - platform: macos-14
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      # Linux system deps required by Tauri's webview + tray.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build, sign & release desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          # Updater signing (required for auto-update to verify downloads).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (skipped when unset → unsigned .app/.dmg).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode (skipped when unset).
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Owlat Desktop ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          # Emit latest.json so the in-app updater endpoint can serve it.
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  # Publish the drafted release only after ALL matrix builds succeed. The build
  # matrix is fail-fast: false, so `needs: build` waits for every OS; a single
  # failed build leaves the release a draft (never public / half-uploaded).
  #
  # The release is drafted during the matrix (releaseDraft: true) so a
  # partially-uploaded release is never visible. GitHub does NOT serve
  # /releases/latest/download/... for a draft, so the in-app updater endpoint
  # (apps/desktop/src-tauri/tauri.conf.json → releases/latest/download/latest.json)
  # never sees a new version until the draft is flipped to published below.
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # flip the drafted release to published
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Publish drafted release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo ${{ github.repository }} --draft=false --latest
