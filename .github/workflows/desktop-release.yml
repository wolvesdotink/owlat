name: Desktop Release (single-target)

# DESKTOP-ONLY release for shipping a fix to the native apps without rebuilding
# the server images. Same reusable core as the unified `v*` pipeline.
#
#   git tag desktop-v0.2.1 && git push origin desktop-v0.2.1
#
# (For a release of everything together, push a plain `v*` tag — see release.yml.)
#
# Signing & notarization are SECRET-GATED: when the relevant repo secrets are
# absent (forks, PRs), the build still runs and produces unsigned artifacts.

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write # create the Release + upload artifacts
  id-token: write # OIDC for build provenance attestations
  attestations: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved desktop-only release VERSION=${VERSION}"

  create-release:
    name: Create draft Release
    needs: resolve
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: create
        uses: softprops/action-gh-release@v3
        with:
          name: "Owlat Desktop ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: true # published by `publish` once the core succeeds
          prerelease: ${{ contains(needs.resolve.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## Owlat Desktop v${{ needs.resolve.outputs.version }}

            Desktop-only release. Download the installer for your OS from the
            assets below (macOS `.dmg`, Windows `.msi`/`.exe`, Linux
            `.AppImage`/`.deb`). Existing installs auto-update to this version.

  desktop:
    name: Desktop apps
    needs: [resolve, create-release]
    uses: ./.github/workflows/_desktop-build.yml
    with:
      tag: ${{ github.ref_name }}
      release_id: ${{ needs.create-release.outputs.release_id }}
    secrets: inherit

  publish:
    name: Publish Release
    needs: [resolve, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Publish (flip draft → live)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          # This pipeline publishes a DESKTOP-ONLY asset set. It must never claim
          # the shared "latest" release — that is reserved for the unified v*
          # line, which consumers (the updater and install.sh) key off. Marking
          # a desktop-only release "latest" would hide the server/install assets.
          if [[ "$VERSION" == *-* ]]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --prerelease --latest=false
          else
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest=false
          fi
          echo "Published $TAG (desktop apps only)."
