name: Security

# Dependency audit + SAST. Runs on PRs and on push to main/stage.

on:
  pull_request:
    branches: [main, stage, pro]
  push:
    branches: [main, stage, pro]
  schedule:
    # Run nightly so a published CVE doesn't wait for the next PR.
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Fail the build on High/Critical vulnerabilities; report-but-pass
      # everything else. `bun audit` exits non-zero on any finding, so the
      # blocking step re-runs with --json and filters by severity.
      - name: Audit (informational)
        run: bun audit || true

      - name: Audit (fail on High/Critical)
        run: |
          set -euo pipefail
          # No empty-output escape hatch: if the audit command fails or prints
          # nothing, this step must FAIL — a broken audit that exits 0 silently
          # disables the gate (which is exactly what happened with the previous
          # `bun pm audit` + npm-quick-audit-shape parser).
          bun audit --json > audit.json || true
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('audit.json', 'utf8').trim();
            if (!raw) {
              console.error('bun audit produced no output — failing closed.');
              process.exit(1);
            }
            // Acknowledged High/Critical advisories whose vulnerable code path is
            // unreachable here, and whose fix we have not taken because it is a
            // major upgrade or it regresses the build. Keyed by GHSA id (stable),
            // so a NEW advisory for the same package still blocks. Anything with a
            // safe drop-in fix must be upgraded (e.g. linkify-it is pinned to 5.0.1
            // in package.json overrides), not listed here. Revisit each on the next
            // safe upgrade.
            const ACKNOWLEDGED = {
              // nodemailer <=9.0.0: the raw-message option can bypass
              // disableFileAccess/disableUrlAccess when raw is {path}/{href}. owlat
              // passes raw only as an already-composed MIME Buffer
              // (apps/mail-sync/src/send.ts), never an object, so the bypass is
              // unreachable. Fix is 9.0.1 — a major bump from ^8.0.6, still pending.
              'GHSA-p6gq-j5cr-w38f': 'nodemailer raw bypass: raw is a Buffer-only path here; fix 9.0.1 is a pending major bump',
              // vite <=7.3.4 / <=8.0.15: server.fs.deny bypass, Windows-only and
              // requires a network-exposed dev server. Production ships built Nitro
              // artifacts on Linux; the vite dev server is never a runtime path.
              'GHSA-fx2h-pf6j-xcff': 'vite server.fs.deny bypass: dev-server only + Windows only, not a production runtime path',
              // nuxt <4.4.7: routeRules middleware bypass via case-sensitivity. owlat
              // defines NO routeRules (web nuxt.config has routeRules:{}, docs/marketing
              // none), so there is no rule to bypass. The fix (4.4.7+) breaks
              // @nuxtjs/og-image prerendering in the docs + marketing builds, so we
              // hold on it; revisit when og-image is compatible with Nuxt 4.4.7+.
              'GHSA-mm7m-92g8-7m47': 'nuxt routeRules bypass: owlat defines no routeRules; 4.4.7+ fix regresses og-image builds',
            };
            // bun emits the npm bulk-advisory shape: { pkgName: Advisory[] }
            const data = JSON.parse(raw);
            const blocking = [];
            const acknowledged = [];
            for (const [pkg, advisories] of Object.entries(data)) {
              for (const a of advisories || []) {
                if (a && (a.severity === 'high' || a.severity === 'critical')) {
                  const ghsa = String(a.url || '').split('/').pop();
                  const row = { pkg, severity: a.severity, title: a.title, url: a.url, ghsa };
                  (ACKNOWLEDGED[ghsa] ? acknowledged : blocking).push(row);
                }
              }
            }
            if (acknowledged.length) {
              console.log('Acknowledged (no upstream fix / not exploitable here):');
              for (const a of acknowledged) {
                console.log(' - [' + a.severity + '] ' + a.pkg + ' ' + a.ghsa + ': ' + ACKNOWLEDGED[a.ghsa]);
              }
            }
            if (blocking.length === 0) {
              console.log('No blocking high/critical vulnerabilities.');
              process.exit(0);
            }
            console.error('Blocking vulnerabilities found:');
            for (const b of blocking) {
              console.error(' - [' + b.severity + '] ' + b.pkg + ' ' + b.ghsa + ': ' + b.title + ' (' + b.url + ')');
            }
            process.exit(1);
          "

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # The returntocorp/semgrep-action is archived upstream; run the official
    # container image directly instead. `--error` makes findings fail the job.
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7

      # Bundled rulesets cover the OWASP top 10 classes most relevant to
      # this stack (XSS, SSRF, prototype-pollution, hardcoded-secrets).
      # The local rules in .semgrep.yml add Owlat-specific patterns —
      # e.g. flagging `v.string()`-typed userId args without a session
      # check. `p/nodejsscan` (njsscan) is intentionally NOT included: it is
      # high-noise on a TypeScript codebase (flags every Math.random(), every
      # `secret`/`apiKey` identifier, every non-trivial regex) and its real
      # signal is already covered by p/javascript + p/security-audit + p/secrets.
      # Test fixtures, docs examples, and templates are excluded via .semgrepignore.
      - name: Semgrep scan
        run: >-
          semgrep scan --error
          --config p/javascript
          --config p/typescript
          --config p/nodejs
          --config p/xss
          --config p/security-audit
          --config p/secrets
          --config .semgrep.yml

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7
        with:
          # Full history: gitleaks detect scans every commit, which is the
          # pre-publication guarantee we want for an OSS repo.
          fetch-depth: 0

      - name: Run gitleaks over the full history
        run: >-
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          detect --source /repo --no-banner --redact --exit-code 1
