name: CI

# S10 / Phase 4.1: harden-runner gives us egress-audit + anomaly detection
# against a compromised action. Version tags (@v5, @v3, …) are kept current
# by Dependabot (.github/dependabot.yml, package-ecosystem: github-actions).
#
# Pull requests run only what they affect: the `detect` job asks Turborepo which
# workspaces changed *through the package graph* and feeds a dynamic matrix, so a
# docs-only PR runs one test job and one image build instead of all of them.
# Pushes, the nightly schedule and manual dispatch run the FULL set as a safety
# valve, so an affected-graph bug surfaces within a day rather than festering.

on:
  pull_request:
    branches: [main, stage, pro, 'integration/**']
  push:
    branches: [main, stage, pro, 'integration/**']
  schedule:
    - cron: '0 5 * * *' # nightly full-matrix safety valve
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect affected
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.select.outputs.packages }}
      api: ${{ steps.select.outputs.api }}
      images: ${{ steps.select.outputs.images }}
      java: ${{ steps.select.outputs.java }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7
        with:
          # --affected diffs HEAD against the PR base, so the base commit must
          # be present in the checkout.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Select affected work
        id: select
        env:
          # Anything that isn't a PR (push, schedule, dispatch) runs everything.
          RUN_ALL: ${{ github.event_name != 'pull_request' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/ci-select-affected.sh

  test:
    name: Test (${{ matrix.name }})
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - uses: actions/setup-node@v7
        if: matrix.name == 'plugin-kit'
        with:
          node-version: '22'

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Phase 3: share Turborepo results across CI runs via the GitHub Actions
      # cache, so a re-run / rebase-with-no-changes replays green suites in seconds.
      - name: Turborepo remote cache
        # Pinned to a commit SHA (not a mutable tag): this third-party action sits
        # in the trust path for test results — a poisoned turbo cache replays
        # "green" without running anything.
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Run tests with coverage
        run: bunx turbo run test:coverage --filter=${{ matrix.package }}

      - name: Upload coverage report
        # Coverage thresholds are enforced during the run regardless; only keep
        # the artifacts from canonical branches to cut PR noise (Phase 4.4).
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.name }}
          path: ${{ matrix.directory }}/coverage/
          retention-days: 14

  # apps/api is the long pole (3300+ tests). Shard it across 3 runners and merge
  # the blob reports for the combined coverage/threshold check (Phase 4.1). Runs
  # vitest directly rather than through turbo because sharding is per-invocation.
  test-api:
    name: Test api (shard ${{ matrix.shard }}/3)
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests (shard ${{ matrix.shard }}/3)
        working-directory: apps/api
        # Collect coverage into the blob, but DON'T enforce the threshold here — a
        # single shard only exercises ~1/3 of the code and would always fall short.
        # The merge job checks the combined coverage against the real threshold.
        run: bunx vitest run --coverage --coverage.thresholds.lines=0 --reporter=blob --shard=${{ matrix.shard }}/3

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        with:
          name: api-blob-${{ matrix.shard }}
          path: apps/api/.vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  test-api-merge:
    name: Test api (merge + coverage)
    needs: [detect, test-api]
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download shard blob reports
        uses: actions/download-artifact@v8
        with:
          path: apps/api/.vitest-reports
          pattern: api-blob-*
          merge-multiple: true

      - name: Merge reports + enforce coverage
        working-directory: apps/api
        run: bunx vitest --merge-reports --coverage

      - name: Upload coverage report
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 14

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7
        with:
          # ci:lint ends with the oxfmt format gate (scripts/check-format.sh),
          # which diffs changed JS/TS files against the base branch. Full
          # history is needed so `git merge-base origin/<base> HEAD` resolves.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      # ci:lint ends with the knip dead-code gate (scripts/check-dead-code.sh)
      # and the file-size ratchet (scripts/check-file-size.sh). The dead-code
      # gate's binary and JSON normaliser both run on node, and setup-bun does
      # not put node on PATH, so pin it explicitly rather than rely on the runner
      # image.
      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Turborepo remote cache
        # Pinned to a commit SHA (not a mutable tag): this third-party action sits
        # in the trust path for test results — a poisoned turbo cache replays
        # "green" without running anything.
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Verify plugin codegen from clean artifacts
        run: bun run plugins:test-clean

      - name: Verify plugin deploy graph
        run: bun run plugins:test-deploy-graph

      - name: Verify Convex plugin composition bundle
        run: bun run plugins:test-convex-bundle

      - name: Lint
        run: bun run ci:lint

      - name: Typecheck
        run: bun run ci:typecheck

  # apps/docs is excluded from the root ci:typecheck pipeline; its Nuxt typecheck
  # runs here. Its vitest suite now runs through the affected `test` matrix above.
  docs-typecheck:
    name: Typecheck (apps/docs)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --cwd apps/docs typecheck

  docker-build:
    name: Docker Build (${{ matrix.name }})
    needs: detect
    if: needs.detect.outputs.images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.images) }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          # Runtime-smoked images must be loaded into the local Docker daemon;
          # the remaining matrix entries can stay cache-only Buildx outputs.
          load: ${{ matrix.runtimeSmoke == true }}
          tags: owlat-ci-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Smoke-test packaged Node runtime
        if: matrix.runtimeSmoke == true
        run: |
          docker run --rm --entrypoint node \
            "owlat-ci-${{ matrix.name }}:${{ github.sha }}" \
            --input-type=module -e "await import('./dist/index.js')"

  # E2E (Playwright) runs nightly + on manual dispatch in .github/workflows/e2e.yml
  # — out-of-band so a failure or unset CONVEX_TEST_URL secret can't block PR merges.

  # packages/sdk-java is outside the bun workspace, so turbo can't track it; the
  # detect job flags it from a Dockerfile-style path diff. Its JUnit suite never
  # ran in CI before this job.
  sdk-java:
    name: Test (packages/sdk-java)
    needs: detect
    if: needs.detect.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + test
        run: mvn -q --batch-mode --file packages/sdk-java/pom.xml verify

  # Single required status check. Skipped matrix jobs (a docs-only PR skips the
  # api shards, most images, etc.) don't count as failures — only real failures
  # or cancellations do. Point branch protection at THIS job, not the matrices.
  test-summary:
    name: Test Summary
    if: always()
    needs: [detect, test, test-api, test-api-merge, lint, docs-typecheck, docker-build, sdk-java]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          echo '${{ toJson(needs) }}'
          failed=$(echo '${{ toJson(needs) }}' \
            | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$failed" ]; then
            echo "::error::Required jobs did not pass: $failed"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
