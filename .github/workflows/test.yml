name: CI

# S10 / Phase 4.1: harden-runner gives us egress-audit + anomaly detection
# against a compromised action. Version tags (@v5, @v3, …) are kept current
# by Dependabot (.github/dependabot.yml, package-ecosystem: github-actions).

on:
  pull_request:
    branches: [main, stage, pro, 'integration/**']
  push:
    branches: [main, stage, pro, 'integration/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: apps/api
            name: api
          - workspace: apps/web
            name: web
          - workspace: packages/email-builder
            name: email-builder
          - workspace: packages/email-renderer
            name: email-renderer
          - workspace: packages/sdk-js
            name: sdk-js
          - workspace: packages/shared
            name: shared
          - workspace: packages/ui
            name: ui
          - workspace: apps/mta
            name: mta
          - workspace: packages/email-scanner
            name: email-scanner
          - workspace: packages/channels
            name: channels
          - workspace: apps/imap
            name: imap
          - workspace: apps/setup-cli
            name: setup-cli
          - workspace: apps/mail-sync
            name: mail-sync
          - workspace: apps/updater
            name: updater
          - workspace: apps/code-worker
            name: code-worker
          - workspace: packages/email-previewer
            name: email-previewer
          - workspace: packages/smtp-client
            name: smtp-client

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run --cwd ${{ matrix.workspace }} test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.name }}
          path: ${{ matrix.workspace }}/coverage/
          retention-days: 14

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7
        with:
          # ci:lint ends with the oxfmt format gate (scripts/check-format.sh),
          # which diffs changed JS/TS files against the base branch. Full
          # history is needed so `git merge-base origin/<base> HEAD` resolves.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # ci:lint ends with the knip dead-code gate (scripts/check-dead-code.sh)
      # and the file-size ratchet (scripts/check-file-size.sh). The dead-code
      # gate's binary and JSON normaliser both run on node, and setup-bun does
      # not put node on PATH, so pin it explicitly rather than rely on the runner
      # image.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run ci:lint

      - name: Typecheck
        run: bun run ci:typecheck

  docker-build:
    name: Docker Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: apps/web/Dockerfile
            context: .
          - name: docs
            dockerfile: apps/docs/Dockerfile
            context: .
          - name: marketing
            dockerfile: apps/marketing/Dockerfile
            context: .
          - name: mta
            dockerfile: apps/mta/Dockerfile
            context: .
          - name: updater
            dockerfile: apps/updater/Dockerfile
            # Monorepo-root context: catalog: versions only resolve via a bun
            # workspace install (matches release.yml).
            context: .
          - name: convex-deploy
            dockerfile: docker/convex-deploy.Dockerfile
            context: .
          - name: imap
            dockerfile: apps/imap/Dockerfile
            context: .
          - name: mail-sync
            dockerfile: apps/mail-sync/Dockerfile
            context: .
          - name: code-worker
            dockerfile: apps/code-worker/Dockerfile
            context: .
          - name: setup
            dockerfile: apps/setup-cli/Dockerfile
            context: .

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # E2E (Playwright) runs nightly + on manual dispatch in .github/workflows/e2e.yml
  # — out-of-band so a failure or unset CONVEX_TEST_URL secret can't block PR merges.

  # apps/docs is excluded from the root ci:* pipelines and the test matrix
  # (it has no test suite) — without this job nothing typechecks it.
  docs-typecheck:
    name: Typecheck (apps/docs)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --cwd apps/docs typecheck

  # packages/sdk-java is outside the bun workspace; its JUnit suite never ran
  # in CI before this job.
  sdk-java:
    name: Test (packages/sdk-java)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + test
        run: mvn -q --batch-mode --file packages/sdk-java/pom.xml verify
