name: Server Release (single-target)

# SERVER-ONLY release for shipping a fix to the backend service images without
# rebuilding the desktop apps. Same reusable core as the unified `v*` pipeline.
#
#   git tag server-v0.2.1 && git push origin server-v0.2.1
#
# (For a release of everything together, push a plain `v*` tag â€” see release.yml.)

on:
  push:
    tags:
      - 'server-v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: server-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved server-only release VERSION=${VERSION}"

  create-release:
    name: Create draft Release
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: softprops/action-gh-release@v3
        with:
          name: "Server v${{ needs.resolve.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: true # published by `publish` once the core succeeds
          prerelease: ${{ contains(needs.resolve.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## Owlat server v${{ needs.resolve.outputs.version }}

            Server-only release (Docker images + compose). Desktop apps unchanged.

            From the admin dashboard â†’ **Settings â†’ System & Updates** â†’ "Update now", or:

            ```sh
            owlat upgrade --version ${{ needs.resolve.outputs.version }}
            ```

            **Images:** `web`, `mta`, `updater`, `convex-deploy`, `imap`, `mail-sync`, `code-worker`, `setup` â€” all `ghcr.io/${{ github.repository_owner }}/<name>:${{ needs.resolve.outputs.version }}`

  server:
    name: Server images
    needs: [resolve, create-release]
    uses: ./.github/workflows/_server-build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      tag: ${{ github.ref_name }}
    secrets: inherit

  publish:
    name: Publish Release
    needs: [resolve, server]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Publish (flip draft â†’ live)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "$VERSION" == *-* ]]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --prerelease
          else
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --latest
          fi
          echo "Published $TAG (server images only)."
